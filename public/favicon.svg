<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="g" x1="0" y1="48" x2="48" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F0146E"/>
      <stop offset="100%" stop-color="#A445B2"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="48" x2="48" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F0146E"/>
      <stop offset="50%" stop-color="#C42D8A"/>
      <stop offset="100%" stop-color="#A445B2"/>
    </linearGradient>
  </defs>
  <!-- Outer ring (thinner, film-strip feel) -->
  <circle cx="24" cy="24" r="22" stroke="url(#g)" stroke-width="2" fill="none"/>
